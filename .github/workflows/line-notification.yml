name: LINE Notification

on: [push]

jobs:
  send-line-msg:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message
        run: |
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H 'Content-Type: application/json' \
          -H 'Authorization: Bearer ${{ secrets.YwBDM6uvdKqhQiRJdgdJaDWCj7/Y0GuKLuXgOzFSfGsozhXkAaogdlBZZ9pl+MBgSmu1ui7LL0MBm0tj5xAeD4T1EUm0TU61PDjjT4elKC2XVzE7NPwLYALjGWEhGLTmnWLBwXFfpl5LgBB/Ls9ckwdB04t89/1O/w1cDnyilFU= }}' \
          -d '{
            "to": "${{ secrets.Ub136b40704235bd591cbd126668f819c }}",
            "messages": [
              {
                "type": "text",
                "text": "🛠️ **GitHub Notification**\n\n📌 Repo: ${{ github.repository }}\n👤 โดย: ${{ github.actor }}\n💬 Message: ${{ github.event.head_commit.message }}\n\n🔗 ดูความเปลี่ยนแปลง: ${{ github.event.head_commit.url }}"
              }
